version: '3.8'

services:
  mysql-local:
    image: mysql:8.0
    container_name: repair_mysql_local
    environment:
      MYSQL_ROOT_PASSWORD: local123
      MYSQL_DATABASE: repair_local
      MYSQL_USER: local
      MYSQL_PASSWORD: local123
    ports:
      - "3308:3306"  # 포트 충돌 방지 (backend:3307, repair:3308)
    volumes:
      - mysql_local_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ulocal", "-plocal123"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql_local_data:
    driver: local
